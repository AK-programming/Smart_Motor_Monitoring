# Render Blueprint — deploy from Dashboard: New > Blueprint > connect this repo
services:
  - type: web
    name: motor-health-monitor
    runtime: python
    rootDir: vibration_project/python_server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT server:app
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: SECRET_KEY
        generateValue: true
